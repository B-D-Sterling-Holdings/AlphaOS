# Data Schema Configuration
# Defines expected columns for each CSV file type

schemas:
  revenue:
    path: "fundamentals/revenue.csv"
    required_columns:
      - year
      - quarter
      - revenue
    optional_columns:
      - revenue_growth_yoy
      - revenue_growth_qoq
    column_types:
      year: int
      quarter: quarter
      revenue: float
      revenue_growth_yoy: float
      revenue_growth_qoq: float

  operating_margins:
    path: "fundamentals/operating_margins.csv"
    required_columns:
      - year
      - quarter
      - operating_margin
    optional_columns:
      - gross_margin
      - net_margin
    column_types:
      year: int
      quarter: quarter
      operating_margin: float
      gross_margin: float
      net_margin: float

  buybacks:
    path: "fundamentals/buybacks.csv"
    required_columns:
      - year
      - quarter
      - shares_outstanding
    optional_columns:
      - shares_repurchased
      - buyback_amount
    column_types:
      year: int
      quarter: quarter
      shares_outstanding: float
      shares_repurchased: float
      buyback_amount: float

  eps:
    path: "fundamentals/eps.csv"
    required_columns:
      - year
      - quarter
      - eps
    optional_columns:
      - eps_diluted
      - eps_growth_yoy
      - eps_growth_qoq
    column_types:
      year: int
      quarter: quarter
      eps: float
      eps_diluted: float
      eps_growth_yoy: float
      eps_growth_qoq: float

  fcf:
    path: "fundamentals/fcf.csv"
    required_columns:
      - year
      - quarter
      - free_cash_flow
    optional_columns:
      - operating_cash_flow
      - capital_expenditures
      - fcf_margin
    column_types:
      year: int
      quarter: quarter
      free_cash_flow: float
      operating_cash_flow: float
      capital_expenditures: float
      fcf_margin: float

  valuation_ratios:
    path: "ratios/valuation_ratios.csv"
    required_columns:
      - date
      - pe_ratio
      - fcf_yield
    optional_columns:
      - price
    column_types:
      date: date
      pe_ratio: float
      fcf_yield: float
      price: float

  daily_prices:
    path: "price_data/daily_prices.csv"
    required_columns:
      - date
      - close
    optional_columns:
      - open
      - high
      - low
      - volume
      - adjusted_close
    column_types:
      date: date
      open: float
      high: float
      low: float
      close: float
      volume: int
      adjusted_close: float

# Note: Only daily_prices is used for price data in this scheme.

# Validation settings
validation:
  date_format: "%Y-%m-%d"
  allow_missing_optional: true
  allow_nan_values: true
  max_nan_percentage: 0.3  # Maximum 30% NaN values per column
